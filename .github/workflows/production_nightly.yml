name: Production Rust Nightly (Full Test Suite)

on:
  schedule:
    # Runs daily at 02:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-suite:
    name: Full Production Test Suite & Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure Rust toolchain is up to date
        run: rustup update stable

      - name: Full Workspace Compilation Check
        run: cargo check --all-targets
        working-directory: rust

      - name: Run Full Workspace Tests in Release Mode
        run: cargo test -r --workspace --all-targets
        working-directory: rust

      - name: Verify Benchmarks Compile
        run: cargo bench --workspace --no-run
        working-directory: rust
